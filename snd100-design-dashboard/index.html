<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SND100 模拟前端设计管理面板</title>
  <meta name="description" content="SND100 模拟前端设计管理面板，用于记录模块进度、设计决策、器件型号和 PCB 验证结果。" />
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1d2733;
      --muted: #64717f;
      --line: #dce5ef;
      --blue: #1f6feb;
      --blue-soft: #eaf2ff;
      --green: #16855f;
      --amber: #b97806;
      --red: #c93939;
      --shadow: 0 12px 28px rgba(29, 39, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #edf5ff 0, #f8fbff 250px, var(--bg) 100%);
      color: var(--text);
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .container {
      width: min(1480px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 3vw, 34px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 700;
      min-height: 42px;
    }

    .btn:hover { border-color: #9ebff4; }
    .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn.danger { color: var(--red); }

    .save-state {
      width: 100%;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0;
    }

    .summary-card {
      background: var(--panel);
      border: 1px solid rgba(220, 229, 239, 0.9);
      border-radius: 12px;
      padding: 18px;
      box-shadow: var(--shadow);
      min-height: 126px;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
    }

    .summary-card .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 7px;
      line-height: 1.4;
    }

    .progress-shell {
      height: 12px;
      border-radius: 999px;
      background: #e3ebf5;
      overflow: hidden;
      margin-top: 14px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--blue), #6aa4ff);
      transition: width 0.2s ease;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .toolbar input,
    .toolbar select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      background: #fff;
      min-height: 40px;
    }

    .toolbar input {
      min-width: min(460px, 100%);
      flex: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 288px 1fr;
      gap: 18px;
    }

    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--shadow);
      height: max-content;
      position: sticky;
      top: 18px;
    }

    .sidebar h2 {
      margin: 4px 8px 12px;
      font-size: 18px;
    }

    .module-nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .module-link {
      border: 0;
      background: transparent;
      text-align: left;
      padding: 10px 11px;
      border-radius: 8px;
      color: var(--text);
    }

    .module-link:hover {
      background: var(--blue-soft);
      color: #174f9e;
    }

    .module-link strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
    }

    .module-link span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .module-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      box-shadow: var(--shadow);
      scroll-margin-top: 20px;
    }

    .module-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .module-head h3 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0;
    }

    .module-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status,
    .owner,
    .field,
    textarea {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      background: #fff;
      width: 100%;
    }

    .module-status {
      width: 150px;
      flex: 0 0 150px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: #fcfdff;
    }

    .task.done {
      background: #f7faf8;
      opacity: 0.78;
    }

    .task-top {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) 150px 118px;
      gap: 10px;
      align-items: center;
    }

    .task-title {
      width: 100%;
      border: 0;
      background: transparent;
      font-weight: 800;
      color: var(--text);
      padding: 7px 4px;
      outline: none;
    }

    .task-title:focus {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 0 0 2px #d6e6ff;
    }

    .task.done .task-title {
      text-decoration: line-through;
      color: #7d8795;
    }

    .task-detail {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
      line-height: 1.5;
    }

    .field-group label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 10px;
    }

    .mini-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 13px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #fbfdff;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 18px 0 10px;
      line-height: 1.7;
    }

    @media (max-width: 1000px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }

    @media (max-width: 760px) {
      .container { width: min(100% - 24px, 1480px); padding-top: 14px; }
      .header { flex-direction: column; }
      .actions { justify-content: flex-start; }
      .save-state { text-align: left; }
      .summary-grid { grid-template-columns: 1fr; }
      .module-head { flex-direction: column; }
      .module-status { width: 100%; flex-basis: auto; }
      .task-top { grid-template-columns: auto 1fr; }
      .task-top .status,
      .task-top .owner { grid-column: 2; }
      .task-detail { grid-template-columns: 1fr; }
      .task-footer { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>SND100 模拟前端设计管理面板</h1>
        <p class="subtitle">按模块推进设计任务，记录设计决策、器件型号、原理图线索和 PCB 验证结果。所有填写内容会自动保存在当前浏览器中。</p>
      </div>
      <div class="actions">
        <button class="btn" id="exportBtn" type="button">导出 JSON</button>
        <label class="btn" for="importInput">导入 JSON</label>
        <input id="importInput" type="file" accept="application/json,.json" hidden />
        <button class="btn danger" id="resetBtn" type="button">恢复默认</button>
        <button class="btn primary" id="addTaskBtn" type="button">新增任务</button>
        <div class="save-state" id="saveState">正在读取本地数据...</div>
      </div>
    </header>

    <section class="summary-grid" aria-label="项目摘要">
      <div class="summary-card">
        <div class="label">总体进度</div>
        <div class="value" id="progressText">0%</div>
        <div class="progress-shell"><div class="progress-bar" id="progressBar"></div></div>
      </div>
      <div class="summary-card">
        <div class="label">已冻结模块</div>
        <div class="value" id="frozenCount">0</div>
        <div class="hint">状态为“已冻结”的模块数量</div>
      </div>
      <div class="summary-card">
        <div class="label">已完成任务</div>
        <div class="value" id="doneCount">0</div>
        <div class="hint" id="doneHint">共 0 项</div>
      </div>
      <div class="summary-card">
        <div class="label">当前阶段</div>
        <div class="value" id="currentStage" style="font-size:22px">系统架构</div>
        <div class="hint">根据首个未完成任务自动判断</div>
      </div>
    </section>

    <section class="toolbar" aria-label="筛选工具">
      <input id="searchInput" placeholder="搜索任务、设计说明、器件型号或验证记录" />
      <select id="statusFilter" aria-label="任务状态筛选">
        <option value="all">全部状态</option>
        <option value="todo">未开始</option>
        <option value="doing">设计中</option>
        <option value="frozen">已冻结</option>
      </select>
      <select id="completionFilter" aria-label="完成状态筛选">
        <option value="all">全部任务</option>
        <option value="open">仅未完成</option>
        <option value="done">仅已完成</option>
      </select>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <h2>模块导航</h2>
        <div class="module-nav" id="moduleNav"></div>
      </aside>
      <main class="content" id="content"></main>
    </div>

    <div class="footer-note">
      数据自动保存在浏览器 localStorage 中。刷新页面、关闭浏览器后仍会保留；更换电脑或清理浏览器数据前，请先导出 JSON 备份。
    </div>
  </div>

  <script>
    const STORAGE_KEY = "snd100_design_dashboard_v3";

    const defaultData = [
      {
        id: "architecture",
        title: "① 系统架构",
        desc: "冻结整机拓扑、供电和四通道关系。",
        status: "doing",
        tasks: [
          "确定整体拓扑：固定 Boost + 低边恒流 + H 桥换向",
          "确定固定 Boost 电压",
          "确定单通道框图",
          "确定四通道结构"
        ]
      },
      {
        id: "reference",
        title: "② 精密参考源",
        desc: "统一 ADC、DAC 的基准体系。",
        status: "todo",
        tasks: [
          "选择 Reference 芯片",
          "参考源输出滤波",
          "确认参考源驱动能力",
          "DAC/ADC Reference 分配"
        ]
      },
      {
        id: "dac",
        title: "③ DAC 电流设定",
        desc: "生成四通道恒流设定值。",
        status: "doing",
        tasks: [
          "冻结 DAC 型号：SGM5348-12",
          "SPI 接口与上电状态",
          "DAC 输出 RC 滤波",
          "DAC 输出量程映射",
          "DAC 校准方案"
        ]
      },
      {
        id: "current",
        title: "④ 恒流控制模块",
        desc: "当前优先级最高，先冻结核心闭环。",
        status: "doing",
        tasks: [
          "冻结低边恒流拓扑",
          "选择恒流运放",
          "选择线性 MOS",
          "确定 MOS 封装",
          "确定 Gate 串联电阻",
          "确定 Gate 下拉",
          "冻结 Rs：15Ω 0.1%",
          "设计环路补偿",
          "确定运放供电",
          "布局测试点"
        ]
      },
      {
        id: "hbridge",
        title: "⑤ H 桥换向",
        desc: "负责双相刺激、断开和死区控制。",
        status: "todo",
        tasks: [
          "确定 P+N MOS 或全 N MOS 结构",
          "选择 H 桥 MOS",
          "确定高边驱动方式",
          "设计死区控制",
          "定义输出状态",
          "输出端默认安全状态"
        ]
      },
      {
        id: "adc",
        title: "⑥ 电流与电压采样",
        desc: "采集实际电流、电极电压和合规余量。",
        status: "doing",
        tasks: [
          "冻结 ADC 型号：SGM5200",
          "Rs 电流采样 RC",
          "Electrode A 分压",
          "Electrode B 分压",
          "ADC 输入保护",
          "阻抗计算方案",
          "Compliance 检测",
          "采样同步策略"
        ]
      },
      {
        id: "protection",
        title: "⑦ 硬件保护",
        desc: "不依赖 MCU 的快速故障关断。",
        status: "todo",
        tasks: [
          "硬件过流比较器",
          "过流阈值与迟滞",
          "输出过压保护",
          "短路保护",
          "开路检测",
          "ESD/浪涌保护",
          "故障锁存与复位"
        ]
      },
      {
        id: "boost",
        title: "⑧ 固定 Boost 电源",
        desc: "暂不做自动压降调节，优先稳定和安全。",
        status: "todo",
        tasks: [
          "确定 Boost 输出电压",
          "选择 Boost 芯片",
          "设计软启动与 EN",
          "输出放电路径",
          "过压与过流保护",
          "EMI 与开关频率规划",
          "评估四通道最坏功耗"
        ]
      },
      {
        id: "mcu",
        title: "⑨ MCU 与接口",
        desc: "定义控制、故障和调试接口。",
        status: "todo",
        tasks: [
          "SPI 资源分配",
          "H 桥控制 GPIO",
          "Fault 输入",
          "上电初始化顺序",
          "看门狗与异常关断",
          "调试接口与测试模式"
        ]
      },
      {
        id: "pcb",
        title: "⑩ PCB 与验证",
        desc: "布局、热设计、测试和设计冻结。",
        status: "todo",
        tasks: [
          "模拟地与数字地规划",
          "四通道对称布局",
          "Reference / ADC / DAC 布局",
          "MOS 散热设计",
          "电极输出爬电距离",
          "测试点与跳线",
          "单通道验证",
          "四通道同时输出验证",
          "开短路与故障验证",
          "设计冻结记录"
        ]
      }
    ].map((module) => ({
      ...module,
      tasks: module.tasks.map((title, index) => ({
        id: `${module.id}_${index}`,
        title,
        notes: "",
        part: "",
        result: "",
        owner: "",
        status: "todo",
        done: false,
        updated: new Date().toISOString()
      }))
    }));

    let data = loadData();
    let saveTimer = null;

    const elements = {
      progressText: document.getElementById("progressText"),
      progressBar: document.getElementById("progressBar"),
      frozenCount: document.getElementById("frozenCount"),
      doneCount: document.getElementById("doneCount"),
      doneHint: document.getElementById("doneHint"),
      currentStage: document.getElementById("currentStage"),
      moduleNav: document.getElementById("moduleNav"),
      content: document.getElementById("content"),
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      completionFilter: document.getElementById("completionFilter"),
      saveState: document.getElementById("saveState")
    };

    function cloneDefaultData() {
      return JSON.parse(JSON.stringify(defaultData));
    }

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : cloneDefaultData();
      } catch {
        return cloneDefaultData();
      }
    }

    function persistData(message = "已自动保存") {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      window.clearTimeout(saveTimer);
      elements.saveState.textContent = `${message} · ${new Date().toLocaleString()}`;
      saveTimer = window.setTimeout(() => {
        elements.saveState.textContent = `上次保存：${new Date().toLocaleString()}`;
      }, 1600);
    }

    function statusLabel(status) {
      const labels = { todo: "未开始", doing: "设计中", frozen: "已冻结" };
      return labels[status] || "未开始";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function getAllTasks() {
      return data.flatMap((module) => module.tasks);
    }

    function updateSummary() {
      const allTasks = getAllTasks();
      const done = allTasks.filter((task) => task.done).length;
      const percent = allTasks.length ? Math.round((done / allTasks.length) * 100) : 0;
      const stage = data.find((module) => module.tasks.some((task) => !task.done));

      elements.progressText.textContent = `${percent}%`;
      elements.progressBar.style.width = `${percent}%`;
      elements.doneCount.textContent = done;
      elements.doneHint.textContent = `共 ${allTasks.length} 项`;
      elements.frozenCount.textContent = data.filter((module) => module.status === "frozen").length;
      elements.currentStage.textContent = stage ? stage.title.replace(/^[①-⑩]\s*/, "") : "全部完成";
    }

    function renderNav() {
      elements.moduleNav.innerHTML = "";
      data.forEach((module) => {
        const done = module.tasks.filter((task) => task.done).length;
        const button = document.createElement("button");
        button.className = "module-link";
        button.type = "button";
        button.innerHTML = `<strong>${escapeHtml(module.title)}</strong><span>${done}/${module.tasks.length} · ${statusLabel(module.status)}</span>`;
        button.addEventListener("click", () => {
          document.getElementById(`module_${module.id}`)?.scrollIntoView({ behavior: "smooth" });
        });
        elements.moduleNav.appendChild(button);
      });
    }

    function taskMatches(task, module) {
      const query = elements.searchInput.value.trim().toLowerCase();
      const status = elements.statusFilter.value;
      const completion = elements.completionFilter.value;
      const text = [task.title, task.notes, task.part, task.result, task.owner, module.title, module.desc]
        .join(" ")
        .toLowerCase();

      if (query && !text.includes(query)) return false;
      if (status !== "all" && task.status !== status) return false;
      if (completion === "open" && task.done) return false;
      if (completion === "done" && !task.done) return false;
      return true;
    }

    function renderContent() {
      elements.content.innerHTML = "";
      let renderedModules = 0;

      data.forEach((module, moduleIndex) => {
        const visibleTasks = module.tasks
          .map((task, taskIndex) => ({ task, taskIndex }))
          .filter(({ task }) => taskMatches(task, module));

        if (!visibleTasks.length && hasActiveFilter()) return;
        renderedModules += 1;

        const section = document.createElement("section");
        section.className = "module-card";
        section.id = `module_${module.id}`;
        section.innerHTML = `
          <div class="module-head">
            <div>
              <h3>${escapeHtml(module.title)}</h3>
              <p>${escapeHtml(module.desc)}</p>
            </div>
            <select class="status module-status" data-module-index="${moduleIndex}">
              ${statusOptions(module.status)}
            </select>
          </div>
          <div class="task-list"></div>
          <div style="margin-top:12px">
            <button class="btn add-module-task" type="button" data-module-index="${moduleIndex}">+ 添加本模块任务</button>
          </div>
        `;

        const list = section.querySelector(".task-list");
        visibleTasks.forEach(({ task, taskIndex }) => list.appendChild(createTaskElement(moduleIndex, taskIndex, task)));
        elements.content.appendChild(section);
      });

      if (!renderedModules) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有找到匹配的任务。";
        elements.content.appendChild(empty);
      }
    }

    function hasActiveFilter() {
      return Boolean(elements.searchInput.value.trim())
        || elements.statusFilter.value !== "all"
        || elements.completionFilter.value !== "all";
    }

    function statusOptions(selected) {
      return ["todo", "doing", "frozen"].map((status) => {
        const isSelected = selected === status ? "selected" : "";
        return `<option value="${status}" ${isSelected}>${statusLabel(status)}</option>`;
      }).join("");
    }

    function createTaskElement(moduleIndex, taskIndex, task) {
      const taskElement = document.createElement("div");
      taskElement.className = `task${task.done ? " done" : ""}`;
      taskElement.dataset.moduleIndex = moduleIndex;
      taskElement.dataset.taskIndex = taskIndex;
      taskElement.innerHTML = `
        <div class="task-top">
          <input class="done-toggle" type="checkbox" ${task.done ? "checked" : ""} aria-label="标记任务完成" />
          <input class="task-title" value="${escapeHtml(task.title)}" aria-label="任务名称" />
          <select class="status task-status" aria-label="任务状态">${statusOptions(task.status)}</select>
          <input class="owner" value="${escapeHtml(task.owner)}" placeholder="负责人" aria-label="负责人" />
        </div>
        <div class="task-detail">
          <div class="field-group">
            <label>设计说明 / 决策依据</label>
            <textarea class="notes">${escapeHtml(task.notes)}</textarea>
          </div>
          <div class="field-group">
            <label>器件型号 / 原理图线索</label>
            <textarea class="part">${escapeHtml(task.part)}</textarea>
          </div>
          <div class="field-group">
            <label>PCB 验证结果 / 问题记录</label>
            <textarea class="result">${escapeHtml(task.result)}</textarea>
          </div>
        </div>
        <div class="task-footer">
          <div class="meta">最后更新：<span class="updated">${new Date(task.updated).toLocaleString()}</span></div>
          <div class="mini-actions">
            <button class="icon-btn duplicate" type="button">复制</button>
            <button class="icon-btn delete" type="button">删除</button>
          </div>
        </div>
      `;

      bindTaskEvents(taskElement);
      return taskElement;
    }

    function bindTaskEvents(taskElement) {
      const moduleIndex = Number(taskElement.dataset.moduleIndex);
      const taskIndex = Number(taskElement.dataset.taskIndex);

      taskElement.querySelector(".done-toggle").addEventListener("change", (event) => {
        updateTask(moduleIndex, taskIndex, "done", event.target.checked);
        if (event.target.checked && data[moduleIndex].tasks[taskIndex].status === "todo") {
          updateTask(moduleIndex, taskIndex, "status", "frozen", false);
          taskElement.querySelector(".task-status").value = "frozen";
        }
        taskElement.classList.toggle("done", event.target.checked);
        updateSummary();
        renderNav();
        persistData();
      });

      [
        ["task-title", "title"],
        ["task-status", "status"],
        ["owner", "owner"],
        ["notes", "notes"],
        ["part", "part"],
        ["result", "result"]
      ].forEach(([className, field]) => {
        const control = taskElement.querySelector(`.${className}`);
        const eventName = control.tagName === "SELECT" ? "change" : "input";
        control.addEventListener(eventName, (event) => {
          updateTask(moduleIndex, taskIndex, field, event.target.value);
          taskElement.querySelector(".updated").textContent = new Date(data[moduleIndex].tasks[taskIndex].updated).toLocaleString();
          updateSummary();
          renderNav();
          persistData();
        });
      });

      taskElement.querySelector(".delete").addEventListener("click", () => {
        if (!confirm("确定删除这项任务吗？")) return;
        data[moduleIndex].tasks.splice(taskIndex, 1);
        persistData("已删除并保存");
        render();
      });

      taskElement.querySelector(".duplicate").addEventListener("click", () => {
        const copy = JSON.parse(JSON.stringify(data[moduleIndex].tasks[taskIndex]));
        copy.id = `${Date.now()}_${Math.random().toString(16).slice(2)}`;
        copy.title = `${copy.title}（复制）`;
        copy.done = false;
        copy.updated = new Date().toISOString();
        data[moduleIndex].tasks.splice(taskIndex + 1, 0, copy);
        persistData("已复制并保存");
        render();
      });
    }

    function updateTask(moduleIndex, taskIndex, field, value, touch = true) {
      data[moduleIndex].tasks[taskIndex][field] = value;
      if (touch) data[moduleIndex].tasks[taskIndex].updated = new Date().toISOString();
    }

    function addTask(moduleIndex = 0) {
      const title = prompt("请输入任务名称：", "新增设计任务");
      if (!title) return;
      data[moduleIndex].tasks.push({
        id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
        title,
        notes: "",
        part: "",
        result: "",
        owner: "",
        status: "todo",
        done: false,
        updated: new Date().toISOString()
      });
      persistData("已新增并保存");
      render();
    }

    function render() {
      updateSummary();
      renderNav();
      renderContent();
    }

    document.getElementById("addTaskBtn").addEventListener("click", () => addTask(0));

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("这会清空当前浏览器里的记录并恢复默认内容。建议先导出 JSON 备份。是否继续？")) return;
      data = cloneDefaultData();
      persistData("已恢复默认并保存");
      render();
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const payload = {
        app: "SND100 模拟前端设计管理面板",
        exportedAt: new Date().toISOString(),
        data
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const anchor = document.createElement("a");
      anchor.href = URL.createObjectURL(blob);
      anchor.download = `SND100_design_dashboard_backup_${new Date().toISOString().slice(0, 10)}.json`;
      anchor.click();
      URL.revokeObjectURL(anchor.href);
    });

    document.getElementById("importInput").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          const nextData = Array.isArray(imported) ? imported : imported.data;
          if (!Array.isArray(nextData)) throw new Error("JSON 格式不正确");
          data = nextData;
          persistData("已导入并保存");
          render();
        } catch (error) {
          alert(`导入失败：${error.message}`);
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    });

    elements.searchInput.addEventListener("input", renderContent);
    elements.statusFilter.addEventListener("change", renderContent);
    elements.completionFilter.addEventListener("change", renderContent);

    elements.content.addEventListener("change", (event) => {
      if (!event.target.classList.contains("module-status")) return;
      const moduleIndex = Number(event.target.dataset.moduleIndex);
      data[moduleIndex].status = event.target.value;
      persistData();
      updateSummary();
      renderNav();
    });

    elements.content.addEventListener("click", (event) => {
      if (!event.target.classList.contains("add-module-task")) return;
      addTask(Number(event.target.dataset.moduleIndex));
    });

    render();
    persistData("已加载本地数据");
  </script>
</body>
</html>
